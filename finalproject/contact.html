<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | FR.dev</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="contact-body">

    <header style="display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 2rem; border-bottom: 1px solid #1e293b;">
        <a href="index.html" style="font-size: 1.5rem; font-weight: bold; color: #ffffff; text-decoration: none;">FR<span style="color: #0ea5e9;">.dev</span></a>
    </header>

    <main class="contact-page">
        <section class="contact-card">
            <h2>Let's Talk Code</h2>
            
            <form method="get" action="success.html" class="contact-form">
                
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>

                <div class="form-group">
                    <label for="message">Project Details</label>
                    <textarea id="message" name="message" placeholder="Project Details" rows="5" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
                
            </form>
        </section>
    </main>

</body>
</html>
