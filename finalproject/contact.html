<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | FR.dev</title>
    <style>
        /* Global Page Reset & Dark Theme Background */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f172a;
            color: #ffffff;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Navbar Header Matching Your Branding */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 2rem;
            background-color: #0f172a;
            border-bottom: 1px solid #1e293b;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }

        .logo span {
            color: #0ea5e9;
        }

        /* Main Container */
        .contact-page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .contact-card {
            width: 100%;
            max-width: 600px;
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid #334155;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        .contact-card h2 {
            color: #0ea5e9;
            margin-bottom: 1.5rem;
            font-size: 2rem;
            text-align: left;
        }

        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        /* Form Layout & Accessibility Grouping */
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-align: left;
        }

        .form-group label {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        /* White Input Fields with Dark Text */
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 1rem;
            background: #ffffff;
            color: #0f172a;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #0ea5e9;
        }

        /* Solid Neon Blue Submit Button */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: #0ea5e9;
            color: #ffffff;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s ease, transform 0.1s ease;
        }

        .submit-btn:hover {
            background: #0284c7;
        }

        .submit-btn:active {
            transform: scale(0.99);
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">FR<span>.dev</span></a>
    </header>

    <main class="contact-page">
        <section class="contact-card">
            <h2>Let's Talk Code</h2>
            
            <form method="get" action="success.html" class="contact-form">
                
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Your Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" name="email" placeholder="Your Email" required>
                </div>

                <div class="form-group">
                    <label for="message">Project Details</label>
                    <textarea id="message" name="message" placeholder="Project Details" rows="5" required></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message</button>
                
            </form>
        </section>
    </main>

</body>
</html>
