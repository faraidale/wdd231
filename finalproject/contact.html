<main style="max-width: 600px; margin: 4rem auto; padding: 2rem; background: var(--card-bg); border-radius: 12px; border: 1px solid #334155;">
    <h2 style="color: var(--accent); margin-bottom: 1.5rem; text-align: left;">Let's Talk Code</h2>
    <form method="get" action="success.html" style="display: flex; flex-direction: column; gap: 1.2rem; text-align: left;">
        
        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="name" style="color: white; font-size: 0.9rem; font-weight: bold;">Your Name</label>
            <input type="text" id="name" name="name" placeholder="Enter your name" required style="padding: 1rem; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #334155;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="email" style="color: white; font-size: 0.9rem; font-weight: bold;">Your Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required style="padding: 1rem; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #334155;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 0.5rem;">
            <label for="message" style="color: white; font-size: 0.9rem; font-weight: bold;">Project Details</label>
            <textarea id="message" name="message" placeholder="Tell me about your project..." rows="5" required style="padding: 1rem; border-radius: 6px; background: #0f172a; color: white; border: 1px solid #334155; font-family: inherit;"></textarea>
        </div>

        <button type="submit" style="padding: 1rem; background: var(--accent); color: white; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; margin-top: 0.5rem; font-size: 1rem;">Send Message</button>
    </form>
</main>
