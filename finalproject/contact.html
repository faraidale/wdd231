<main style="max-width: 600px; margin: 4rem auto; padding: 2rem; background: var(--card-bg); border-radius: 12px; border: 1px solid #334155;">
    <h2>Let's Talk Code</h2>
    <form method="get" action="success.html" style="display: flex; flex-direction: column; gap: 1rem;">
        <input type="text" name="name" placeholder="Your Name" required style="padding: 1rem; border-radius: 6px; background: var(--bg-dark); color: white; border: 1px solid #334155;">
        <input type="email" name="email" placeholder="Your Email" required style="padding: 1rem; border-radius: 6px; background: var(--bg-dark); color: white; border: 1px solid #334155;">
        <textarea name="message" placeholder="Project Details" rows="5" required style="padding: 1rem; border-radius: 6px; background: var(--bg-dark); color: white; border: 1px solid #334155;"></textarea>
        <button type="submit" style="padding: 1rem; background: var(--accent); color: white; font-weight: bold; border: none; border-radius: 6px; cursor: pointer;">Send Message</button>
    </form>
</main>
